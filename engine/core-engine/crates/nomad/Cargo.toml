[package]
name = "petri-nomad"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
description = "HashiCorp Nomad integration for Petri-Lab workflow engine"

[dependencies]
# HTTP client
reqwest = { workspace = true }

# Async runtime
tokio = { workspace = true }

# Streaming
tokio-util = { workspace = true }
bytes = { workspace = true }

# Serialization
serde = { workspace = true }
serde_json = { workspace = true }
base64 = { workspace = true }

# Time
chrono = { workspace = true }

# Async streams
futures = { workspace = true }

# NATS messaging (for watcher signal publishing)
async-nats = { workspace = true }

# Async traits
async-trait = { workspace = true }

# Configuration
config = { workspace = true }

# Error handling
thiserror = { workspace = true }

# Logging
tracing = { workspace = true }

# Internal crates
petri-domain = { workspace = true }
petri-scheduler-bridge = { workspace = true }

[dev-dependencies]
tokio = { workspace = true, features = ["rt-multi-thread", "macros"] }
tracing-subscriber = { workspace = true }
petri-test-harness = { workspace = true, features = ["nomad", "nats"] }
base64 = { workspace = true }
