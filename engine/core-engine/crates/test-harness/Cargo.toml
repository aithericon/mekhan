[package]
name = "petri-test-harness"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
description = "Test harness and utilities for Petri-Lab crates"

[features]
default = []
nats = ["dep:async-nats", "dep:uuid", "dep:tracing", "dep:futures", "dep:testcontainers", "dep:testcontainers-modules"]
nomad = ["dep:tracing"]
integration = ["nats", "dep:rand", "dep:petri-nats", "dep:petri-infrastructure", "dep:thiserror"]
nomad-integration = ["integration", "nomad", "dep:petri-nomad"]
slurm-integration = ["integration", "dep:petri-slurm"]
executor-integration = ["integration", "dep:petri-executor", "dep:aithericon-executor-domain", "dep:aithericon-executor-worker", "dep:aithericon-executor-backend", "dep:apalis", "dep:apalis-nats", "dep:tracing-subscriber"]

[dependencies]
# Internal crates
petri-domain = { workspace = true }
petri-application = { workspace = true }
aithericon-sdk = { path = "../../../sdk" }

# Serialization
serde = { workspace = true }
serde_json = { workspace = true }
schemars = { workspace = true }

# Time
chrono = { workspace = true }

# Concurrency
parking_lot = { workspace = true }

# Async runtime (required now that EventRepository is async)
tokio = { workspace = true, features = ["macros", "rt"] }
async-trait = { workspace = true }

# Testing - re-exported for consumers
rstest = { workspace = true }
async-nats = { workspace = true, optional = true }
uuid = { workspace = true, optional = true }
tracing = { workspace = true, optional = true }
futures = { workspace = true, optional = true }

# Optional integration testing support
rand = { workspace = true, optional = true }
petri-nats = { workspace = true, optional = true }
petri-nomad = { workspace = true, optional = true }
petri-slurm = { workspace = true, optional = true }
petri-executor = { workspace = true, optional = true }
aithericon-executor-domain = { workspace = true, optional = true }
aithericon-executor-worker = { workspace = true, optional = true }
aithericon-executor-backend = { workspace = true, optional = true }
apalis = { workspace = true, optional = true }
apalis-nats = { workspace = true, optional = true }
petri-infrastructure = { workspace = true, optional = true }
testcontainers = { workspace = true, optional = true }
testcontainers-modules = { workspace = true, optional = true }
thiserror = { workspace = true, optional = true }
tracing-subscriber = { workspace = true, optional = true }
reqwest = { workspace = true, optional = true }
base64 = { workspace = true, optional = true }
hex = { workspace = true, optional = true }
