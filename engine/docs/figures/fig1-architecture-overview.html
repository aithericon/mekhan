<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fig. 1 — Architecture Overview</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #ffffff;
    font-family: -apple-system, "Segoe UI", Helvetica, Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }
  @media print { body { background: #fff; } }
</style>
</head>
<body>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" width="720" height="420">
  <defs>
    <marker id="a" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4a5568"/>
    </marker>
    <marker id="ab" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2c5282"/>
    </marker>
    <marker id="ao" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#c05621"/>
    </marker>
  </defs>

  <!-- ========== USER ========== -->
  <circle cx="38" cy="115" r="12" fill="none" stroke="#4a5568" stroke-width="1.5"/>
  <line x1="38" y1="127" x2="38" y2="152" stroke="#4a5568" stroke-width="1.5"/>
  <line x1="24" y1="140" x2="52" y2="140" stroke="#4a5568" stroke-width="1.5"/>
  <line x1="38" y1="152" x2="27" y2="172" stroke="#4a5568" stroke-width="1.5"/>
  <line x1="38" y1="152" x2="49" y2="172" stroke="#4a5568" stroke-width="1.5"/>
  <text x="38" y="188" text-anchor="middle" font-size="11" fill="#4a5568">User</text>

  <!-- Arrow: User → Engine -->
  <line x1="58" y1="140" x2="94" y2="140" stroke="#4a5568" stroke-width="1.3" marker-end="url(#a)"/>
  <text x="76" y="133" text-anchor="middle" font-size="8.5" fill="#718096">submit</text>

  <!-- ========== WORKFLOW ENGINE ========== -->
  <rect x="100" y="40" width="350" height="230" rx="2" fill="#f7fafc" stroke="#2c5282" stroke-width="2"/>
  <text x="275" y="64" text-anchor="middle" font-size="12" font-weight="600" fill="#2c5282" letter-spacing="0.5">WORKFLOW ENGINE</text>

  <!-- Optimization loop -->
  <rect x="116" y="80" width="318" height="138" rx="1" fill="#fff" stroke="#cbd5e0" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="275" y="96" text-anchor="middle" font-size="10" font-weight="600" fill="#c05621" letter-spacing="0.3">OPTIMIZATION LOOP</text>

  <!-- Loop nodes: 3 boxes in a row -->
  <!-- Optimizer -->
  <rect x="128" y="108" width="82" height="36" rx="1" fill="#fff5eb" stroke="#c05621" stroke-width="1.3"/>
  <text x="169" y="123" text-anchor="middle" font-size="10" font-weight="600" fill="#c05621">Optimizer</text>
  <text x="169" y="136" text-anchor="middle" font-size="8.5" fill="#9c4221">(Nevergrad)</text>

  <!-- mumax3 -->
  <rect x="248" y="108" width="82" height="36" rx="1" fill="#fff" stroke="#2c5282" stroke-width="1.3"/>
  <text x="289" y="123" text-anchor="middle" font-size="10" font-weight="500" fill="#2d3748">mumax3</text>
  <text x="289" y="136" text-anchor="middle" font-size="8.5" fill="#718096">simulations</text>

  <!-- Post-processing -->
  <rect x="346" y="108" width="82" height="36" rx="1" fill="#fff" stroke="#2c5282" stroke-width="1.3"/>
  <text x="387" y="120" text-anchor="middle" font-size="10" font-weight="500" fill="#2d3748">Post-</text>
  <text x="387" y="132" text-anchor="middle" font-size="10" font-weight="500" fill="#2d3748">processing</text>

  <!-- Arrow: Optimizer → mumax3 -->
  <line x1="210" y1="120" x2="243" y2="120" stroke="#c05621" stroke-width="1.3" marker-end="url(#ao)"/>

  <!-- Arrow: mumax3 → Post-processing -->
  <line x1="330" y1="126" x2="341" y2="126" stroke="#4a5568" stroke-width="1.3" marker-end="url(#a)"/>

  <!-- Arrow: Post-processing → Optimizer (loop back, goes below) -->
  <path d="M 387 144 L 387 165 L 169 165 L 169 144" fill="none" stroke="#4a5568" stroke-width="1.3" marker-end="url(#a)"/>
  <text x="278" y="176" text-anchor="middle" font-size="8.5" fill="#718096">loss</text>

  <!-- Labels on top arrows -->
  <text x="226" y="113" text-anchor="middle" font-size="8" fill="#718096">candidates</text>

  <!-- Loop iteration label -->
  <text x="275" y="206" text-anchor="middle" font-size="9" fill="#718096" font-style="italic">iterate until converged</text>

  <!-- ========== HPC CLUSTER ========== -->
  <rect x="508" y="40" width="195" height="165" rx="2" fill="#f7fafc" stroke="#4a5568" stroke-width="1.2"/>
  <text x="605" y="64" text-anchor="middle" font-size="12" font-weight="600" fill="#4a5568" letter-spacing="0.3">HPC CLUSTER</text>

  <!-- Nodes -->
  <rect x="526" y="82" width="60" height="32" rx="1" fill="#edf2f7" stroke="#a0aec0" stroke-width="1"/>
  <text x="556" y="97" text-anchor="middle" font-size="9.5" fill="#4a5568">node-01</text>
  <text x="556" y="108" text-anchor="middle" font-size="8" fill="#718096">mumax3</text>

  <rect x="594" y="82" width="60" height="32" rx="1" fill="#edf2f7" stroke="#a0aec0" stroke-width="1"/>
  <text x="624" y="97" text-anchor="middle" font-size="9.5" fill="#4a5568">node-02</text>
  <text x="624" y="108" text-anchor="middle" font-size="8" fill="#718096">mumax3</text>

  <rect x="526" y="122" width="60" height="32" rx="1" fill="#edf2f7" stroke="#a0aec0" stroke-width="1"/>
  <text x="556" y="137" text-anchor="middle" font-size="9.5" fill="#4a5568">node-03</text>
  <text x="556" y="148" text-anchor="middle" font-size="8" fill="#718096">mumax3</text>

  <rect x="594" y="122" width="60" height="32" rx="1" fill="#edf2f7" stroke="#a0aec0" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="624" y="137" text-anchor="middle" font-size="9.5" fill="#a0aec0">node-04</text>
  <text x="624" y="148" text-anchor="middle" font-size="8" fill="#a0aec0">(failed)</text>

  <rect x="526" y="162" width="60" height="32" rx="1" fill="#edf2f7" stroke="#a0aec0" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="556" y="177" text-anchor="middle" font-size="9.5" fill="#a0aec0">node-05</text>
  <text x="556" y="188" text-anchor="middle" font-size="8" fill="#a0aec0">(idle)</text>

  <rect x="594" y="162" width="60" height="32" rx="1" fill="#edf2f7" stroke="#a0aec0" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="624" y="177" text-anchor="middle" font-size="9.5" fill="#a0aec0">node-06</text>
  <text x="624" y="188" text-anchor="middle" font-size="8" fill="#a0aec0">(idle)</text>

  <!-- Arrow: Engine → Cluster (dispatch) -->
  <line x1="450" y1="120" x2="502" y2="120" stroke="#4a5568" stroke-width="1.3" marker-end="url(#a)"/>
  <text x="476" y="113" text-anchor="middle" font-size="8.5" fill="#718096">dispatch</text>

  <!-- Arrow: Cluster → Engine (signals) -->
  <line x1="502" y1="170" x2="450" y2="170" stroke="#4a5568" stroke-width="1.3" marker-end="url(#a)"/>
  <text x="476" y="185" text-anchor="middle" font-size="8.5" fill="#718096">signals</text>

  <!-- ========== STORAGE ========== -->
  <!-- Cylinder -->
  <ellipse cx="440" cy="330" rx="105" ry="14" fill="#f7fafc" stroke="#4a5568" stroke-width="1.2"/>
  <rect x="335" y="330" width="210" height="44" fill="#f7fafc" stroke-width="0"/>
  <line x1="335" y1="330" x2="335" y2="374" stroke="#4a5568" stroke-width="1.2"/>
  <line x1="545" y1="330" x2="545" y2="374" stroke="#4a5568" stroke-width="1.2"/>
  <ellipse cx="440" cy="374" rx="105" ry="14" fill="#f7fafc" stroke="#4a5568" stroke-width="1.2"/>
  <text x="440" y="357" text-anchor="middle" font-size="12" font-weight="600" fill="#4a5568">Storage</text>

  <!-- Arrow: Engine → Storage -->
  <line x1="275" y1="270" x2="370" y2="325" stroke="#2c5282" stroke-width="1.3" marker-end="url(#ab)"/>
  <text x="300" y="308" text-anchor="middle" font-size="8.5" fill="#2c5282">events + outputs</text>

  <!-- Arrow: Storage → Engine -->
  <line x1="390" y1="318" x2="300" y2="270" stroke="#4a5568" stroke-width="1.3" marker-end="url(#a)"/>
  <text x="362" y="284" text-anchor="middle" font-size="8.5" fill="#718096">stage inputs</text>

  <!-- Arrow: Cluster ↔ Storage (direct connection) -->
  <line x1="545" y1="335" x2="590" y2="210" stroke="#4a5568" stroke-width="1.1" marker-end="url(#a)"/>
  <text x="582" y="280" text-anchor="middle" font-size="8.5" fill="#718096" transform="rotate(-65, 582, 280)">data I/O</text>

  <line x1="572" y1="208" x2="527" y2="330" stroke="#4a5568" stroke-width="1.1" marker-end="url(#a)"/>

</svg>
</body>
</html>
