# NATS server config for the local dev stack (docker-compose).
#
# Replaces the inline CLI flags so we can raise `max_payload` above the 1 MiB
# default. Deeply-nested workflows (e.g. SubWorkflow recursion in the
# motion-planning demos) embed their child templates' AIR by value, and the
# engine publishes the fully-lowered net as a single NATS message on deploy;
# those payloads can exceed 1 MiB. 8 MiB gives ample headroom while staying
# well under JetStream's 64 MiB ceiling.
port: 4222
http: 8222

max_payload: 8MB

# Raise the protocol control-line limit (default 4 KiB). Zero-secret runner /
# worker enrollment mints scoped NATS JWTs whose embedded permission set can
# push the credentials well past 4 KiB; the JWT travels in the CONNECT control
# line, so a large one is rejected with "maximum control line exceeded" before
# the client can connect. 1 MiB is ample headroom.
max_control_line: 1MB

jetstream {
  store_dir: "/data"
}
