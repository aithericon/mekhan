# Host ports + the compose project name are parameterized for per-worktree
# isolation (see just/scripts/dev-ports.sh). `${VAR:-legacy}` keeps the
# historical fixed ports when the env is unset (slot 0 / no direnv / CI), and
# COMPOSE_PROJECT_NAME (set only for slot ≥ 1) namespaces containers, networks,
# and volumes so concurrent worktrees never collide. Container names are
# intentionally NOT pinned so the project prefix takes effect.
services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB: mekhan
      POSTGRES_USER: mekhan
      POSTGRES_PASSWORD: mekhan
    ports:
      - "${MEKHAN_PG_PORT:-15439}:5432"
    volumes:
      - mekhan-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mekhan -d mekhan"]
      interval: 5s
      timeout: 3s
      retries: 5

  nats:
    image: nats:2.12-alpine
    command: ["-c", "/etc/nats/nats.conf"]
    ports:
      - "${MEKHAN_NATS_PORT:-14333}:4222"        # client
      - "${MEKHAN_NATS_MON_PORT:-18333}:8222"    # http monitoring
    volumes:
      - mekhan-natsdata:/data
      - ./deploy/docker/nats.conf:/etc/nats/nats.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Vault: local secret store for the `resources` subsystem ──────────────
  # Runs in -dev mode: root token "root", in-memory storage (wiped on restart),
  # KV v2 auto-mounted at `secret/`. Mekhan-service writes resource secrets to
  # `secret/data/aithericon/resources/{workspace}/{resource}/v{version}`;
  # mekhan + engine read with VAULT_TOKEN, executor unwraps per-job wrapping
  # tokens with VAULT_ADDR alone.
  #
  # NOT FOR PRODUCTION — dev mode disables persistence + uses an HTTP listener
  # with a known root token. `just dev reset` wipes the container (along with
  # pg/nats/rustfs) so resources start clean.
  vault:
    image: hashicorp/vault:1.18
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: "root"
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
      VAULT_ADDR: "http://127.0.0.1:8200"
    ports:
      - "${MEKHAN_VAULT_PORT:-18200}:8200"
    healthcheck:
      # Dev mode: unsealed + active from boot. 200 = standby-allowed active leader.
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8200/v1/sys/health?standbyok=true"]
      interval: 5s
      timeout: 3s
      retries: 10

  rustfs:
    image: rustfs/rustfs:latest
    ports:
      - "${MEKHAN_S3_PORT:-19005}:9000"          # S3 API (mekhan + executor artifact store)
      - "${MEKHAN_S3_CONSOLE_PORT:-19006}:9001"  # web console
    environment:
      RUSTFS_ROOT_USER: rustfsadmin
      RUSTFS_ROOT_PASSWORD: rustfsadmin
      # `rustfs:latest` (>= 2026-05) refuses to start on non-loopback
      # listeners with the default credentials. This is a local dev stack
      # behind the docker bridge — allow the default rather than churning
      # creds across mekhan + executor configs.
      RUSTFS_ALLOW_INSECURE_DEFAULT_CREDENTIALS: "true"
    volumes:
      - mekhan-rustfs-data:/data
      - mekhan-rustfs-logs:/logs

  # ── LiveKit: WebRTC SFU for live media stream presentation ───────────────
  # Single-node dev mode with static keys devkey/secret. The RTC media ports
  # MUST be mapped 1:1 host<->container so the ICE candidates LiveKit advertises
  # (node_ip 127.0.0.1, use_external_ip=false) are actually reachable from the
  # browser — a remapped host port would hand the browser a candidate pointing
  # at a port nothing is listening on. The whole server config is passed inline
  # via LIVEKIT_CONFIG (the image's documented `--config-body` env), with the
  # rtc tcp/udp ports interpolated from the same env vars used for the host
  # mapping so the two can never drift.
  livekit:
    image: livekit/livekit-server:latest
    environment:
      LIVEKIT_CONFIG: |
        port: 7880
        bind_addresses: [""]
        rtc:
          tcp_port: ${MEKHAN_LIVEKIT_RTC_TCP_PORT:-7881}
          udp_port: ${MEKHAN_LIVEKIT_RTC_UDP_PORT:-7882}
          use_external_ip: false
          # node_ip is the address the server advertises as its ICE candidate.
          # 127.0.0.1 works for native clients (executor publisher) and Chromium,
          # but Firefox refuses to send ICE checks to a loopback REMOTE candidate
          # — so the SFU never learns the browser's NAT-reflexive address and the
          # subscriber connection never establishes (black video). Advertising the
          # host's LAN IP instead makes Firefox probe it; the packet still hits the
          # 0.0.0.0-published UDP port and the prflx return path forms exactly as it
          # does for Chromium. dev-ports.sh computes the LAN IP into this var.
          node_ip: ${MEKHAN_LIVEKIT_NODE_IP:-127.0.0.1}
        keys:
          devkey: secret
    ports:
      - "${MEKHAN_LIVEKIT_PORT:-7880}:7880"                                              # signaling (ws)
      - "${MEKHAN_LIVEKIT_RTC_TCP_PORT:-7881}:${MEKHAN_LIVEKIT_RTC_TCP_PORT:-7881}"       # rtc/tcp (1:1)
      - "${MEKHAN_LIVEKIT_RTC_UDP_PORT:-7882}:${MEKHAN_LIVEKIT_RTC_UDP_PORT:-7882}/udp"   # rtc/udp (1:1)
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:7880/"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Zitadel: local OIDC/SSO provider for the auth integration ────────────
  # First-instance bootstrap creates:
  #   - org "Mekhan"
  #   - human admin   zitadel-admin@mekhan.localhost / Password1!
  #   - machine admin zitadel-admin-sa (PAT written to ./deploy/zitadel/pat/)
  # Run `deploy/zitadel/bootstrap.sh` once after `docker compose up -d` to
  # create the OIDC application and write app/.env.local.
  zitadel-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: zitadel
    ports:
      - "${MEKHAN_ZITADEL_DB_PORT:-15440}:5432"
    volumes:
      - zitadel-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  zitadel:
    image: ghcr.io/zitadel/zitadel:v4.15.0
    restart: unless-stopped
    # FirstInstance config (admin user, machine user, PAT path) is supplied
    # via `--steps /zitadel-config/zitadel.yaml`. Database + external URL
    # come from env so they're discoverable in `docker compose config`.
    #
    # Not publishing port 8080 to the host — `zitadel-proxy` (caddy) fronts
    # the core API + the split-out login UI on a single host port.
    command: >
      start-from-init
      --masterkey "MasterkeyNeedsToHave32Characters"
      --tlsMode disabled
      --steps /zitadel-config/zitadel.yaml
    environment:
      ZITADEL_DATABASE_POSTGRES_HOST: zitadel-db
      ZITADEL_DATABASE_POSTGRES_PORT: 5432
      ZITADEL_DATABASE_POSTGRES_DATABASE: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_USERNAME: postgres
      ZITADEL_DATABASE_POSTGRES_USER_PASSWORD: postgres
      ZITADEL_DATABASE_POSTGRES_USER_SSL_MODE: disable
      ZITADEL_DATABASE_POSTGRES_ADMIN_USERNAME: postgres
      ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD: postgres
      ZITADEL_DATABASE_POSTGRES_ADMIN_SSL_MODE: disable
      ZITADEL_EXTERNALDOMAIN: localhost
      ZITADEL_EXTERNALPORT: ${MEKHAN_ZITADEL_PORT:-18080}
      ZITADEL_EXTERNALSECURE: "false"
      ZITADEL_TLS_ENABLED: "false"
    expose:
      - "8080"
    depends_on:
      zitadel-db:
        condition: service_healthy
    volumes:
      - ./deploy/zitadel/pat:/pat
      - ./deploy/zitadel/zitadel.yaml:/zitadel-config/zitadel.yaml:ro
    healthcheck:
      test: ["CMD", "/app/zitadel", "ready", "--config", "/app/configs/defaults.yaml"]
      interval: 10s
      timeout: 5s
      retries: 12

  # Zitadel v4 split the login UI into its own Next.js container. It needs a
  # PAT to call the core API for session management — we reuse the machine
  # admin's PAT that FirstInstance writes to /pat.
  zitadel-login:
    image: ghcr.io/zitadel/zitadel-login:v4.15.0
    restart: unless-stopped
    environment:
      # Route the login UI's internal API calls back through caddy so the
      # upstream `Host: localhost:18080` header matches Zitadel's
      # ExternalDomain. Hitting `zitadel:8080` directly trips the instance
      # resolver and returns "Instance not found".
      ZITADEL_API_URL: "http://zitadel-proxy:8080"
      ZITADEL_SERVICE_USER_TOKEN_FILE: /pat/zitadel-admin-sa.pat
      NEXT_PUBLIC_BASE_PATH: "/ui/v2/login"
    expose:
      - "3000"
    depends_on:
      zitadel:
        condition: service_healthy
    volumes:
      - ./deploy/zitadel/pat:/pat:ro

  # Reverse proxy: routes /ui/v2/login/* to zitadel-login and everything else
  # to zitadel core, so the whole stack appears on a single host port.
  zitadel-proxy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "${MEKHAN_ZITADEL_PORT:-18080}:8080"
    volumes:
      - ./deploy/zitadel/Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - zitadel
      - zitadel-login

volumes:
  mekhan-pgdata:
  mekhan-natsdata:
  mekhan-rustfs-data:
  mekhan-rustfs-logs:
  zitadel-pgdata:
