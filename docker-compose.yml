services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mekhan
      POSTGRES_USER: mekhan
      POSTGRES_PASSWORD: mekhan
    ports:
      - "5432:5432"
    volumes:
      - mekhan-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mekhan -d mekhan"]
      interval: 5s
      timeout: 3s
      retries: 5

  nats:
    image: nats:2.10-alpine
    command: ["--jetstream", "--store_dir", "/data"]
    ports:
      - "4333:4222"
      - "8333:8222"
    volumes:
      - mekhan-natsdata:/data
    healthcheck:
      test: ["CMD", "nats-server", "--help"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  mekhan-pgdata:
  mekhan-natsdata:
