<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<script>
			// Default to the dark dashboard theme on first visit (no stored
			// preference yet). mode-watcher reads this same key, so its toggle
			// still wins once the user picks light/dark/system. Runs before
			// paint to avoid a light flash.
			(function () {
				try {
					var k = 'mode-watcher-mode';
					if (!localStorage.getItem(k)) localStorage.setItem(k, 'dark');
					if (localStorage.getItem(k) === 'dark')
						document.documentElement.classList.add('dark');
				} catch (e) {}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
