# =============================================================================
# Cargo build config — cross-compile to aarch64-unknown-linux-musl
# =============================================================================
# Mirrors web-platform/.cargo/config.toml. The two non-obvious bits:
#
#   1. linker = "rust-lld" + link-self-contained=yes
#      Avoids needing the musl gcc on PATH as the final linker. rustc bundles
#      its own LLD + musl runtime; no PATH coordination with the C toolchain.
#
#   2. CC = "gcc" and CXX = "g++" at the bottom
#      Critical. When ring (or any *-sys crate) compiles its C code, cc-rs
#      reads CC_<target> for TARGET compilation — that's aarch64-linux-musl-gcc.
#      But build scripts themselves run on the HOST (x86_64 in CI). Without
#      this explicit override they'd inherit CC=aarch64-linux-musl-gcc and try
#      to exec the cross-gcc to build a host binary → fails or produces wrong
#      arch. CC=gcc forces host build scripts back to the system compiler.
# =============================================================================

[net]
git-fetch-with-cli = true

[target.aarch64-unknown-linux-musl]
linker = "rust-lld"
rustflags = [
    "-C", "link-self-contained=yes",
    "-C", "linker=rust-lld",
    # Target Ampere Altra (Neoverse-N1, ARMv8.2-A) explicitly. Without this
    # the compiler / cc-rs assume the build host's CPU features, which can
    # include ARMv8.4+ instructions Ampere doesn't support — runtime SIGILL
    # (exit 132). aws-lc-sys's aarch64 assembly is the usual culprit.
    "-C", "target-cpu=neoverse-n1",
]

# x86_64 musl — the container-staging executor (docs/22). Built static so the
# bind-mounted binary runs inside ANY apptainer image regardless of the image's
# glibc. Mirrors the aarch64 block (rust-lld + self-contained musl runtime),
# minus the Ampere `target-cpu` (x86_64 generic). For the `slurm-up` build this
# is driven by cargo-zigbuild, which sets its own linker env (overriding the
# `linker` here); the block still makes a plain `cargo build --target
# x86_64-unknown-linux-musl` produce a fully static binary.
[target.x86_64-unknown-linux-musl]
linker = "rust-lld"
rustflags = [
    "-C", "link-self-contained=yes",
    "-C", "linker=rust-lld",
    "-C", "target-feature=+crt-static",
]

[env]
SQLX_OFFLINE = "true"

# TARGET C compiler — used by cc-rs / *-sys build scripts to compile target C.
CC_aarch64_unknown_linux_musl  = "aarch64-linux-musl-gcc"
CXX_aarch64_unknown_linux_musl = "aarch64-linux-musl-g++"
AR_aarch64_unknown_linux_musl  = "aarch64-linux-musl-ar"

# Tell the target C/C++ compiler to limit itself to Ampere's instruction set
# (Neoverse-N1 / ARMv8.2-A). Without this, *-sys crates compile C with the
# build host's broader feature set baked in → runtime SIGILL on Ampere.
# Mirrors the `-C target-cpu=neoverse-n1` we set for rustc above.
CFLAGS_aarch64_unknown_linux_musl   = "-mcpu=neoverse-n1"
CXXFLAGS_aarch64_unknown_linux_musl = "-mcpu=neoverse-n1"

# HOST compiler — explicit so build scripts that run on the x86_64 CI host
# don't accidentally pick up the cross-gcc above. See header comment.
CC  = "gcc"
CXX = "g++"
