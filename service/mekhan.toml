# Transactional email (invites, resource shares, member-added, welcome).
# Maps onto the `aithericon-email` Mailer port. Default mode = "log" (render to
# the tracing log; offline, no creds). Override via MEKHAN__EMAIL__* env vars.
#
# [email]
# mode = "log"                              # log | smtp | brevo
# from_address = "no-reply@aithericon.com"
# from_name = "Aithericon"
# public_base_url = "https://app.aithericon.com"   # links are built against this
# product_name = "Aithericon"
# support_address = "support@aithericon.com"
# invite_ttl_secs = 604800                  # 7 days
#
# # mode = "smtp" — lettre relay. smtp_tls: auto (465 implicit, else STARTTLS)
# # | implicit | starttls | none (plaintext dev relays e.g. MailHog on 1025):
# smtp_host = "smtp.example.com"
# smtp_port = 587
# smtp_username = "apikey"
# smtp_password = "..."
# smtp_tls = "auto"
#
# # mode = "brevo" — Brevo transactional HTTP API:
# brevo_api_key = "xkeysib-..."
