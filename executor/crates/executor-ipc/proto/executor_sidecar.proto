syntax = "proto3";
package aithericon.executor.ipc;

service ExecutorSidecar {
    rpc LogArtifact(LogArtifactRequest) returns (SidecarResponse);
    rpc UpdateProgress(UpdateProgressRequest) returns (SidecarResponse);
    rpc DefinePhases(DefinePhasesRequest) returns (SidecarResponse);
    rpc UpdatePhase(UpdatePhaseRequest) returns (SidecarResponse);
    rpc LogMessage(LogMessageRequest) returns (SidecarResponse);
    rpc SetOutput(SetOutputRequest) returns (SidecarResponse);
    rpc LogMetrics(LogMetricsRequest) returns (SidecarResponse);
    rpc HealthCheck(HealthCheckRequest) returns (SidecarResponse);
    rpc ShutdownAck(ShutdownAckRequest) returns (SidecarResponse);

    // Dynamic control-token emission into a statically-declared output channel.
    // CONTROL plane: the child emits a `signal` (one control token) or a
    // `scatter` (N instance-colored items bracketed by a close that stamps the
    // count). DATA plane (1b): the child emits an `open` (carrying the JSON
    // transport DESCRIPTOR of a data channel it just opened) so the consumer can
    // start draining the out-of-band byte stream EARLY, then a `close` (stamping
    // the element count + terminal status) once the producer is done writing.
    // The sidecar validates the name+plane against the manifest, then publishes a
    // `control_emit` event to the EXECUTOR_EVENTS JetStream stream
    // (subject `executor.events.{execution_id}.control_emit`) which the engine
    // ingests to deposit a token into the channel's place. Fire-and-forget: the
    // engine never gates the emit.
    rpc EmitControl(EmitControlRequest) returns (SidecarResponse);

    // Data-plane CONSUMER read (`for elem in aithericon.stream(name)`): the
    // child opens this server-stream passing the PRODUCER's transport subject
    // (lifted from the `open` descriptor the engine delivered as this job's
    // input). The executor subscribes to that subject over the data-plane
    // `StreamTransport` and relays each binary envelope here while the producer
    // is still writing. Each yielded `ChunkMessage` is a binary envelope
    // `{ seq, content_type, payload, is_eof }`; the stream ends after the
    // in-band EOF sentinel (`ChunkMessage{is_eof:true}`).
    rpc StreamChunks(StreamChunksRequest) returns (stream ChunkMessage);

    // Outbound byte stream: the producer writer (`open_output(name)`) hands the
    // executor one framed element at a time; the executor publishes the binary
    // envelope onto the channel's datastream transport subject
    // (`executor.datastream.{execution_id}.{channel}`) so a consumer elsewhere
    // can drain it. The SDK holds no NATS/transport credentials; the executor
    // does. Unary + ordered: the writer awaits each publish so the transport's
    // ack window can back-pressure a too-fast producer.
    rpc PublishChunk(PublishChunkRequest) returns (SidecarResponse);

    // Inbound file retrieval: the child asks the sidecar (which holds storage
    // credentials — the child does not) to download a storage-path object into
    // the run directory and return its local path. Backs the Python SDK's
    // `aithericon.File.retrieve()` — e.g. lazily fetching an asset record's
    // `File`-field value (a storage path) only for the row the code selected.
    rpc RetrieveFile(RetrieveFileRequest) returns (RetrieveFileResponse);
}

enum ArtifactCategory {
    ARTIFACT_CATEGORY_OTHER = 0;
    ARTIFACT_CATEGORY_MODEL = 1;
    ARTIFACT_CATEGORY_DATASET = 2;
    ARTIFACT_CATEGORY_PLOT = 3;
    ARTIFACT_CATEGORY_LOG = 4;
    ARTIFACT_CATEGORY_CHECKPOINT = 5;
    ARTIFACT_CATEGORY_CONFIG = 6;
    ARTIFACT_CATEGORY_METRIC = 7;
}

enum PhaseStatus {
    PHASE_STATUS_PENDING = 0;
    PHASE_STATUS_RUNNING = 1;
    PHASE_STATUS_COMPLETED = 2;
    PHASE_STATUS_FAILED = 3;
    PHASE_STATUS_SKIPPED = 4;
}

enum LogLevel {
    LOG_LEVEL_INFO = 0;
    LOG_LEVEL_TRACE = 1;
    LOG_LEVEL_DEBUG = 2;
    LOG_LEVEL_WARN = 3;
    LOG_LEVEL_ERROR = 4;
}

enum ResponseStatus {
    RESPONSE_STATUS_OK = 0;
    RESPONSE_STATUS_ERROR = 1;
    RESPONSE_STATUS_NOT_FOUND = 2;
    RESPONSE_STATUS_INVALID_ARGUMENT = 3;
}

enum MetricType {
    METRIC_TYPE_SCALAR = 0;
    METRIC_TYPE_COUNTER = 1;
    METRIC_TYPE_GAUGE = 2;
    METRIC_TYPE_HISTOGRAM = 3;
}

message LogArtifactRequest {
    string artifact_id = 1;
    string path = 2;
    string name = 3;
    ArtifactCategory category = 4;
    string mime_type = 5;
    map<string, string> metadata = 6;
    bool extract_file_metadata = 7;
    bool blocking = 8;
    // JSON-serialized StorageConfig for per-artifact storage.
    // When non-empty, the artifact is uploaded to this storage backend
    // instead of the global ArtifactStore.
    string storage_config_json = 9;
}

message UpdateProgressRequest {
    float fraction = 1;
    string message = 2;
    uint64 current_step = 3;
    uint64 total_steps = 4;
}

message DefinePhasesRequest {
    repeated string phase_names = 1;
}

message UpdatePhaseRequest {
    string phase_name = 1;
    PhaseStatus status = 2;
    string message = 3;
}

message LogMessageRequest {
    LogLevel level = 1;
    string message = 2;
    map<string, string> fields = 3;
}

message SetOutputRequest {
    string name = 1;
    string value_json = 2;
}

message MetricPoint {
    string name = 1;
    double value = 2;
    optional uint64 step = 3;
    int64 timestamp_ms = 4;
    MetricType metric_type = 5;
    map<string, string> labels = 6;
}

message LogMetricsRequest {
    repeated MetricPoint points = 1;
}

message HealthCheckRequest {
    uint64 sequence = 1;
}

message ShutdownAckRequest {
    int32 exit_code = 1;
}

message SidecarResponse {
    ResponseStatus status = 1;
    string error_message = 2;
}

message RetrieveFileRequest {
    // Storage path to fetch (an `InputSource::StoragePath` key — e.g. an asset
    // record's `File`-field value).
    string storage_path = 1;
}

message RetrieveFileResponse {
    ResponseStatus status = 1;
    string error_message = 2;
    // Absolute local path the object was written to (under the run dir).
    // Empty unless status == RESPONSE_STATUS_OK.
    string local_path = 3;
}

// Kind of control token a job emits into a channel's place. Collapsed (docs/25,
// consumer-join refactor) to EXACTLY THREE uniform kinds; the producer emits one
// bracketed episode (`OPEN` … `ITEM`* … `CLOSE`) and the CONSUMER edge's `join`
// (each | gather) decides how it is folded — there is no producer-side contract
// branch.
//
//   `CONTROL_KIND_OPEN`  — episode lifecycle marker. On the DATA plane it carries
//     the transport DESCRIPTOR as `payload_json` (emitted the moment
//     `open_output(name)` is called, EARLY) so the consumer can connect and start
//     draining out-of-band bytes while the producer still produces. On the CONTROL
//     plane it is a harmless lifecycle marker (gather state is driven by the
//     close/count coordinator, not open). Still emitted for uniformity.
//   `CONTROL_KIND_ITEM`  — one element of the episode. Carries the payload, plus
//     (control plane) `item_idx` + `episode_uid` so a gather barrier can re-order
//     and correlate. Absorbs the old SIGNAL (a "signal"/alert is just one ITEM).
//   `CONTROL_KIND_CLOSE` — end of the episode. On the CONTROL plane carries the
//     item `count` (+ `episode_uid`) so a gather coordinator knows the fan-out is
//     complete; on the DATA plane `payload_json` carries `{count, status}`. The
//     bulk bytes NEVER ride a control token — they flow over the transport subject
//     named in the OPEN descriptor.
enum ControlKind {
    CONTROL_KIND_OPEN = 0;
    CONTROL_KIND_ITEM = 1;
    CONTROL_KIND_CLOSE = 2;
}

// A single control-token emission into a declared output channel.
//
// `channel` is the channel name (must match an `out` channel in the job's
// channel manifest — a `control` channel for item, a `data` channel for the
// data-plane brackets). `payload_json` is the JSON-serialized payload: the
// element value for ITEM; the transport DESCRIPTOR
// `{transport, subject, content_type, credential?}` for OPEN; `{count, status}`
// for a data-plane CLOSE. `item_idx` is the 0-based element index within the
// episode (carried on ITEM). `count` is the total element count, carried on a
// control-plane CLOSE (0 otherwise). `episode_uid` is a per-episode correlation
// id minted once per producer episode and stamped on every item + the close so
// the engine's gather barrier can correlate all emits of one invocation (empty
// for a data open/close).
message EmitControlRequest {
    string channel = 1;
    ControlKind kind = 2;
    string payload_json = 3;
    uint64 item_idx = 4;
    uint64 count = 5;
    string episode_uid = 6;
}

// Request to open a data-plane inbound byte stream (the consumer read).
//
// `channel` is the data-plane `in` channel being read (the SDK passes the name
// from `stream(name)`) — informational/diagnostic. `subject` is the PRODUCER's
// transport subject, lifted by the SDK out of the `open` DESCRIPTOR the engine
// delivered as this consumer job's input (`descriptor.subject` =
// `executor.datastream.{producer_execution_id}.{channel}`). The executor
// subscribes to that subject over the data-plane `StreamTransport` and relays
// each binary envelope back over this server-stream until the in-band EOF
// sentinel. An empty `subject` yields an immediately-empty stream (no producer
// descriptor was present — offline / not wired).
message StreamChunksRequest {
    string channel = 1;
    string subject = 2;
    // Out-of-band transport tag lifted from the producer's `open` descriptor
    // (`jetstream` | `nats-latest`). The consumer's executor dispatches the
    // matching subscribe adapter off this so it reads the stream the same way
    // the producer wrote it. Empty defaults to `jetstream` (older producers /
    // descriptors that predate the field).
    string transport = 3;
}

// One binary envelope on a data stream (producer→consumer), or the end-of-stream
// sentinel. This is the uniform framing for BOTH JSON and binary elements:
// `payload` is the raw element bytes (for a JSON element the producer sets
// `payload = utf8(json)` + `content_type = "application/json"`; for a binary
// element it is the opaque blob + its MIME type). `seq` is the producer's
// monotonically-increasing element index (ordering/dedup); `is_eof` marks the
// in-band terminator (after which `payload` is empty and the stream ends).
message ChunkMessage {
    uint64 seq = 1;
    string content_type = 2;
    bytes payload = 3;
    bool is_eof = 4;
}

// Publish one binary envelope onto a data-plane `out` channel's transport
// subject. Backs the producer writer (`open_output(name) -> writer.write(...)`):
// the SDK never touches NATS/credentials itself — it hands the executor the
// element bytes + content_type and the executor (which holds the transport
// connection + any unwrapped credential) frames and publishes them. The final
// `is_eof` envelope is published by the writer's context-exit, immediately
// before the SDK emits the `close` control token.
message PublishChunkRequest {
    // The data-plane `out` channel the bytes belong to (names the transport
    // subject: `executor.datastream.{execution_id}.{channel}`).
    string channel = 1;
    ChunkMessage envelope = 2;
}
