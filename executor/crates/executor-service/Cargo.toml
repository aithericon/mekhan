[package]
name = "aithericon-executor-service"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true

[dependencies]
aithericon-executor-domain = { workspace = true }
aithericon-executor-backend = { workspace = true }
aithericon-executor-process = { workspace = true }
aithericon-executor-worker = { workspace = true }
aithericon-executor-storage = { workspace = true }
aithericon-executor-metrics = { workspace = true, features = ["nats", "loki"] }
aithericon-executor-logs = { workspace = true, features = ["nats", "loki"] }
apalis = { workspace = true }
apalis-core = { workspace = true }
apalis-nats = { workspace = true }
async-nats = { workspace = true }
tokio = { workspace = true }
tokio-util = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
shellexpand = "3"
serde_json = { workspace = true }
tower = { workspace = true }
axum = { workspace = true, optional = true }
aithericon-executor-docker = { workspace = true, optional = true }
aithericon-executor-http = { workspace = true, optional = true }
aithericon-executor-python = { workspace = true, optional = true }
aithericon-executor-llm = { workspace = true, optional = true }
aithericon-executor-file-ops = { workspace = true, optional = true }
aithericon-executor-kreuzberg = { workspace = true, optional = true }
aithericon-executor-surya = { workspace = true, optional = true }
aithericon-executor-smtp = { workspace = true, optional = true }
aithericon-executor-postgres = { workspace = true, optional = true }
aithericon-executor-loki = { workspace = true, optional = true }
aithericon-executor-prometheus = { workspace = true, optional = true }
aithericon-secrets = { workspace = true }
# Shared backend metadata — drives `build_executor`'s registration loop.
aithericon-backends = { workspace = true }

[features]
default = []
opendal = ["aithericon-executor-storage/opendal", "aithericon-executor-worker/opendal"]
url-inputs = ["aithericon-executor-worker/url-inputs"]
opendal-s3 = ["opendal", "aithericon-executor-storage/opendal-s3"]
opendal-gcs = ["opendal", "aithericon-executor-storage/opendal-gcs"]
opendal-azblob = ["opendal", "aithericon-executor-storage/opendal-azblob"]
docker = ["dep:aithericon-executor-docker", "aithericon-executor-test-harness/docker"]
python = ["dep:aithericon-executor-python", "aithericon-executor-test-harness/python"]
http-cancel = ["dep:axum"]
http = ["dep:aithericon-executor-http"]
llm = ["dep:aithericon-executor-llm"]
vault = ["aithericon-secrets/vault", "aithericon-executor-worker/vault"]
file-ops = ["dep:aithericon-executor-file-ops", "opendal", "aithericon-executor-test-harness/file-ops"]
kreuzberg = ["dep:aithericon-executor-kreuzberg", "aithericon-executor-kreuzberg/full"]
surya = ["dep:aithericon-executor-surya"]
smtp = ["dep:aithericon-executor-smtp"]
postgres = ["dep:aithericon-executor-postgres"]
loki = ["dep:aithericon-executor-loki"]
prometheus = ["dep:aithericon-executor-prometheus"]

[dev-dependencies]
aithericon-executor-test-harness = { workspace = true }
aithericon-executor-domain = { workspace = true }
aithericon-executor-worker = { workspace = true }
aithericon-executor-storage = { workspace = true }
aithericon-executor-ipc = { workspace = true }
aithericon-executor-logs = { workspace = true, features = ["loki"] }
aithericon-executor-metrics = { workspace = true, features = ["nats", "loki"] }
aithericon-executor-smtp = { workspace = true }
aithericon-executor-backend = { workspace = true }
aithericon-executor-backend-configs = { workspace = true }
serde = { workspace = true }
lettre = { version = "0.11", default-features = false, features = [
    "tokio1",
    "smtp-transport",
    "builder",
] }
uuid = { workspace = true }
serde_json = { workspace = true }
tracing-subscriber = { workspace = true }
tokio = { workspace = true }
tokio-util = { workspace = true }
tempfile = "3"
futures = { workspace = true }
async-nats = { workspace = true }
async-trait = { workspace = true }
aithericon-secrets = { workspace = true }
mailparse = "0.15"
reqwest = { workspace = true }
# Sandbox e2e (tests/sandbox.rs, gated TEST_SANDBOX=1): boots the
# Dockerfile.sandbox-test executor image via testcontainers against the shared
# test NATS. testcontainers-modules[nats] mirrors the harness's NATS container.
testcontainers = { workspace = true }
testcontainers-modules = { workspace = true }
