[package]
name = "aithericon-executor-test-harness"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true

[dependencies]
aithericon-executor-domain = { workspace = true }
aithericon-executor-backend = { workspace = true }
aithericon-executor-worker = { workspace = true }
aithericon-executor-storage = { workspace = true }
aithericon-executor-metrics = { workspace = true }
aithericon-executor-logs = { workspace = true }
apalis = { workspace = true }
apalis-core = { workspace = true }
apalis-nats = { workspace = true }
async-nats = { workspace = true }
async-trait = { workspace = true }
tokio = { workspace = true }
tokio-util = { workspace = true }
futures = { workspace = true }
bytes = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
uuid = { workspace = true }
tracing = { workspace = true }
chrono = { workspace = true }
testcontainers = { workspace = true }
testcontainers-modules = { workspace = true }
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
bollard = { workspace = true, optional = true }
aithericon-executor-file-ops = { workspace = true, optional = true }
opendal = { workspace = true, features = ["services-memory"], optional = true }

[features]
default = []
docker = ["aithericon-executor-backend/docker", "dep:bollard"]
python = ["aithericon-executor-backend/python"]
http = ["aithericon-executor-backend/http"]
file-ops = ["dep:aithericon-executor-file-ops", "dep:opendal"]
