# =============================================================================
# Lint pool — fmt + clippy (single light gate)
# =============================================================================
# Fast feedback loop. Runs on every push to main/dev and every PR targeting
# them. Scheduled on the lint pool.
#
# Recipes live in just/ci.just; this YAML just invokes them. The CI builder
# image carries the rust toolchain + native build deps (HDF5, NetCDF, protoc)
# so the same recipes work here and locally without a nix develop wrapper.
#
# Tests + frontend quality intentionally deferred — see CI roadmap. Once those
# are wired we re-add web-quality, rust-check, vitest as separate pools.
# =============================================================================

when:
  - branch: main
    event: push
  - branch: dev
    event: push
  - branch: main
    event: pull_request
  - branch: dev
    event: pull_request
  # Manual run from any branch — handy for testing the pipeline on a
  # feature branch (e.g. `ci-pipeline`) before merging to dev.
  - event: manual

labels:
  role: lint

steps:
  - name: rust-fmt-clippy
    image: forge.aithericon.eu/milanender/mekhan-ci-builder:latest
    environment:
      CARGO_HOME: /var/lib/ci-jobs/cache/cargo
    commands:
      - just ci::quality-rust
    depends_on: []
