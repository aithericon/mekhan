# =============================================================================
# Deploy pool — Terraform/Nomad rollout of mekhan-service (PROD)
# =============================================================================
# Sibling of 40-deploy.yml (dev). Same shared HetznerCluster (10.20.x), but a
# FULLY ISOLATED deployment: distinct Nomad job (mekhan-service-prod), Postgres
# DB (mekhan_prod), NATS account (mekhan-prod), S3 bucket (mekhan-artifacts),
# Vault role, and Zitadel org. All divergence flows from `environment="prod"`
# in deploy/prod/prod.auto.tfvars via deploy/prod/locals.tf.
#
# Branch model (mirrors web-platform): push `dev` → deploy DEV (40-deploy);
# push `main` → deploy PROD (this pipeline). Plus a manual trigger for replays.
#
# NO rebuild on the prod path. 30-build runs on the `dev` push and publishes
# the image keyed by that commit SHA. dev→main is FAST-FORWARDED, so main's
# commit SHA == dev's SHA and the image already exists — prod just pulls it.
# Hence no `depends_on: [30-build]` here. REQUIRES fast-forward-only merges:
# a merge commit on main would have a SHA with no built image and this deploy
# would fail with `manifest unknown` (re-trigger 30-build manually if so).
#
# ONE-TIME PROD BOOTSTRAP (before the first successful run) — see
# deploy/README.md:
#   1. Seed Vault at  secret/services/mekhan/prod  with: hetzner_s3_access_key,
#      hetzner_s3_secret_key, state_encryption_passphrase, smtp_username,
#      smtp_password.
#   2. Run  deploy/prod/scripts/generate-nats-user.sh prod  (mints the
#      mekhan-prod NATS account + creds at secret/nats/apps/mekhan/prod/worker).
#   3. Ensure the `mekhan-artifacts` S3 bucket + the mekhan.aithericon.eu DNS
#      record exist.
#
# SECRETS MODEL (mirrors 40-deploy.yml): single Woodpecker secret `vault_token`;
# VAULT_ADDR hardcoded; everything else pulled inline from Vault.
#
# NETWORK NOTE: 10.20.0.* is reachable only over NetBird. The runner picking up
# `role: deploy` MUST be on the mesh.
# =============================================================================

when:
  - branch: main
    event: push
  - event: manual

# No build dependency: the image was published by 30-build on the dev push and
# is reused here via the fast-forward merge (same SHA). See header.

labels:
  role: deploy
  host: worker-stateful-arm

steps:
  - name: deploy-prod
    image: forge.aithericon.eu/milanender/mekhan-ci-builder:latest
    pull: true
    environment:
      VAULT_ADDR: "http://10.20.0.20:8200"
      VAULT_TOKEN:
        from_secret: vault_token
      NOMAD_SKIP_VERIFY: "true"
    commands:
      # prod.auto.tfvars is gitignored — CI uses the committed .example.
      - cp deploy/prod/prod.auto.tfvars.example deploy/prod/prod.auto.tfvars
      - export NOMAD_TOKEN=$(vault kv get -field=token secret/nomad/bootstrap)
      - export TF_VAR_nomad_token=$NOMAD_TOKEN
      - export TF_VAR_postgres_admin_password=$(vault kv get -field=superuser_password secret/postgres/patroni)
      - export TF_VAR_registry_user=$(vault kv get -field=username secret/docker/registry)
      - export TF_VAR_registry_password=$(vault kv get -field=token secret/docker/registry)

      # prod-scoped secrets live under secret/services/mekhan/prod (distinct
      # from dev). Seed them once before the first run (see header).
      - export AWS_ACCESS_KEY_ID=$(vault kv get -field=hetzner_s3_access_key secret/services/mekhan/prod)
      - export AWS_SECRET_ACCESS_KEY=$(vault kv get -field=hetzner_s3_secret_key secret/services/mekhan/prod)
      - export TF_VAR_s3_access_key=$AWS_ACCESS_KEY_ID
      - export TF_VAR_s3_secret_key=$AWS_SECRET_ACCESS_KEY
      - export TF_VAR_state_encryption_passphrase=$(vault kv get -field=state_encryption_passphrase secret/services/mekhan/prod)

      - export TF_VAR_email_smtp_username=$(vault kv get -field=smtp_username secret/services/mekhan/prod)
      - export TF_VAR_email_smtp_password=$(vault kv get -field=smtp_password secret/services/mekhan/prod)

      - vault kv get -field=key secret/zitadel/iac-jwt > /tmp/zitadel-iac-jwt.json
      - export TF_VAR_zitadel_jwt_file=/tmp/zitadel-iac-jwt.json

      - export TF_VAR_postgres_admin_host=postgres-primary.service.consul
      - 'echo "  ✓ Secrets loaded from Vault"'

      # Deploy this commit's image SHA. 30-build published it on the dev push;
      # the FF merge keeps the SHA, so it already exists. Override the literal
      # for a replay of an older SHA.
      - just ci::deploy-prod "$CI_COMMIT_SHA"
    depends_on: []

  - name: verify-prod
    image: forge.aithericon.eu/milanender/mekhan-ci-builder:latest
    pull: true
    environment:
      VAULT_ADDR: "http://10.20.0.20:8200"
      VAULT_TOKEN:
        from_secret: vault_token
      NOMAD_SKIP_VERIFY: "true"
    commands:
      - cp deploy/prod/prod.auto.tfvars.example deploy/prod/prod.auto.tfvars
      - export NOMAD_TOKEN=$(vault kv get -field=token secret/nomad/bootstrap)
      - export AWS_ACCESS_KEY_ID=$(vault kv get -field=hetzner_s3_access_key secret/services/mekhan/prod)
      - export AWS_SECRET_ACCESS_KEY=$(vault kv get -field=hetzner_s3_secret_key secret/services/mekhan/prod)
      - export TF_VAR_state_encryption_passphrase=$(vault kv get -field=state_encryption_passphrase secret/services/mekhan/prod)
      - export NOMAD_ADDR=$(grep '^nomad_address' deploy/prod/prod.auto.tfvars | cut -d'"' -f2)
      - 'echo "  ✓ Secrets loaded from Vault"'

      - just ci::verify-deploy prod
    depends_on: [deploy-prod]
