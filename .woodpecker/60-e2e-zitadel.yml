# =============================================================================
# Layer-2 e2e — real Zitadel PAT introspection
# =============================================================================
# Gated: MANUAL only. Docker-heavy (brings up the full compose stack incl.
# Zitadel) and unproven on the CI runner. Keep it opt-in until validated; do
# NOT make it a PR/push gate.
#
# Brings the stack up, runs deploy/zitadel/bootstrap.sh (provisions the
# introspection API app + writes mekhan.local.toml), then runs the
# MEKHAN_E2E_ZITADEL-gated test which mints / uses / revokes a live
# service-user PAT. `just ci::test-e2e-zitadel` always `docker compose down -v`s.
# =============================================================================

when:
  - branch: main
    event: manual
  - branch: dev
    event: manual

labels:
  role: test

steps:
  - name: e2e-zitadel
    image: forge.aithericon.eu/milanender/mekhan-ci-builder:latest
    environment:
      CARGO_HOME: /var/lib/ci-jobs/cache/cargo
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    commands:
      - just ci::test-e2e-zitadel
    depends_on: []
