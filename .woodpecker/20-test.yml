# =============================================================================
# Test pool — cargo check (until services are wired) + vitest
# =============================================================================
# `service/tests/` now compiles cleanly. The remaining blocker before flipping
# `check-rust` → `test-rust` is provisioning Postgres + NATS for this step:
#   - service integration tests expect Postgres at TEST_POSTGRES_URL
#     (default postgres://test:test@localhost:5599/test) and NATS at
#     TEST_NATS_URL (default nats://localhost:4322)
#   - engine NATS/Nomad/Slurm tests use testcontainers (need Docker-in-Docker)
#
# Add a `services:` block (or shared compose) supplying both, then swap the
# command below to `just ci::test-rust`.
# =============================================================================

when:
    - branch: main
      event: push
    - branch: dev
      event: push
    - branch: main
      event: pull_request
    - branch: dev
      event: pull_request
    - branch: main
      event: manual
    - branch: dev
      event: manual

labels:
    "!host": titan
    role: test

steps:
    - name: rust-check
      image: 192.168.101.1:5000/nixos/nix:2.32.8
      environment:
          NIX_CONFIG: "experimental-features = nix-command flakes"
          CARGO_HOME: /var/lib/ci-jobs/cache/cargo
      commands:
          - nix develop --no-write-lock-file --command bash -lc 'just ci::check-rust'
      depends_on: []

    - name: web-test
      image: 192.168.101.1:5000/nixos/nix:2.32.8
      environment:
          NIX_CONFIG: "experimental-features = nix-command flakes"
          NPM_CONFIG_CACHE: /var/lib/ci-jobs/cache/npm
      commands:
          - nix develop --no-write-lock-file --command bash -lc 'just ci::test-frontend-unit'
      depends_on: []
