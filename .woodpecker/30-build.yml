# =============================================================================
# Build pool — cross-musl binary, frontend bundle, package & push image
# =============================================================================
# Runs only on push to main/dev (not on PRs — PRs run lint but don't produce a
# registry image). Output is `<registry>/mekhan-service:{sha,branch}`,
# consumed by the deploy pipeline in 40-deploy.yml.
#
# Registry: forge.aithericon.eu (Forgejo built-in OCI). Auth via the
# `forgejo_registry_user` / `forgejo_registry_password` Woodpecker secrets.
#
# `package` does `docker buildx build --platform linux/arm64`, so the build
# runner needs either native ARM64 hardware or QEMU + binfmt registered.
# =============================================================================

when:
  - branch: main
    event: push
  - branch: dev
    event: push
  # Manual run from any branch — for testing the build pipeline on a
  # feature branch before merging. Produces images tagged with the
  # commit SHA + branch slug, so feature-branch images can be deployed
  # via a manual 40-deploy run.
  - event: manual

labels:
  role: build

steps:
  - name: build-backend
    image: forge.aithericon.eu/milanender/mekhan-ci-builder@sha256:7da0591a1477b05694e231954acc1ed23410beeb2b25707ca9b7980f0f0f70e9
    environment:
      CARGO_HOME: /var/lib/ci-jobs/cache/cargo
    commands:
      # Diagnostic — confirms runner kernel arch vs gcc binary arch.
      # If `uname -m` is aarch64 but `file` says x86-64, the image's arm64
      # variant smuggled amd64 binaries (buildx without QEMU/binfmt). If
      # uname is x86_64, the runner host isn't actually arm64. Remove this
      # block once builds are green.
      - echo "uname -m  → $(uname -m)"
      - echo "gcc path  → $(readlink -f $(which aarch64-linux-musl-gcc))"
      - file $(readlink -f $(which aarch64-linux-musl-gcc))
      - just ci::build-backend
    depends_on: []

  - name: build-frontend
    image: forge.aithericon.eu/milanender/mekhan-ci-builder@sha256:7da0591a1477b05694e231954acc1ed23410beeb2b25707ca9b7980f0f0f70e9
    environment:
      NPM_CONFIG_CACHE: /var/lib/ci-jobs/cache/npm
    commands:
      - just ci::build-frontend
    depends_on: []

  - name: package-and-push
    image: forge.aithericon.eu/milanender/mekhan-ci-builder@sha256:7da0591a1477b05694e231954acc1ed23410beeb2b25707ca9b7980f0f0f70e9
    environment:
      REGISTRY: forge.aithericon.eu/milanender
      # Vault is the canonical source for the Forgejo image-push creds
      # (secret/docker/registry). Same single VAULT_TOKEN as 40-deploy.yml.
      VAULT_ADDR: "http://10.20.0.20:8200"
      VAULT_TOKEN:
        from_secret: vault_token
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    commands:
      - FORGEJO_REGISTRY_USER=$(vault kv get -field=username secret/docker/registry)
      - FORGEJO_REGISTRY_PASSWORD=$(vault kv get -field=token   secret/docker/registry)
      - echo "$FORGEJO_REGISTRY_PASSWORD" | docker login forge.aithericon.eu -u "$FORGEJO_REGISTRY_USER" --password-stdin
      - just ci::package "$REGISTRY" "$CI_COMMIT_SHA" "$CI_COMMIT_BRANCH"
      - just ci::push    "$REGISTRY" "$CI_COMMIT_SHA" "$CI_COMMIT_BRANCH"
    depends_on: [build-backend, build-frontend]
