# =============================================================================
# Build pool — cross-musl binary, frontend bundle, package & push image
# =============================================================================
# Runs only on push to main/dev (not on PRs — PRs run lint but don't produce a
# registry image). Output is `<registry>/mekhan-service:{sha,branch}`,
# consumed by the deploy pipeline in 40-deploy.yml.
#
# Registry: forge.aithericon.eu (Forgejo built-in OCI). Auth via the
# `forgejo_registry_user` / `forgejo_registry_password` Woodpecker secrets.
#
# `package` does `docker buildx build --platform linux/arm64`, so the build
# runner needs either native ARM64 hardware or QEMU + binfmt registered.
# =============================================================================

# 20-test.yml is disabled — re-add `depends_on: [20-test]` when it's back.
when:

  - branch: main
    event: push

  - event: manual

labels:
  role: build
  host: worker-stateful-arm

steps:
  - name: build-backend-service
    image: forge.aithericon.eu/milanender/mekhan-ci-builder:latest
    pull: true
    environment:
      CARGO_HOME: /var/lib/ci-jobs/cache/cargo
      # Persist target/ outside the (per-run) workspace so dependency
      # compilation is reused. Same path is reused by test-rust + the
      # publish step's cp, so they all see incremental builds.
      CARGO_TARGET_DIR: /var/lib/ci-jobs/cache/target/mekhan
    volumes:
      # Host bind on cax21 — survives across CI runs, gives real cargo
      # caching. First run creates the dir; subsequent runs reuse it.
      - /var/lib/ci-jobs/cache:/var/lib/ci-jobs/cache
    commands:
      - just ci::build-backend-service
    depends_on: []

  - name: build-frontend
    image: forge.aithericon.eu/milanender/mekhan-ci-builder:latest
    pull: true
    environment:
      NPM_CONFIG_CACHE: /var/lib/ci-jobs/cache/npm
    volumes:
      - /var/lib/ci-jobs/cache:/var/lib/ci-jobs/cache
    commands:
      - just ci::build-frontend
    depends_on: []


  - name: publish-backend-service
    image: forge.aithericon.eu/milanender/mekhan-ci-builder:latest
    pull: true
    environment:
      REGISTRY: forge.aithericon.eu/milanender

      VAULT_ADDR: "http://10.20.0.20:8200"
      VAULT_TOKEN:
        from_secret: vault_token

      CARGO_TARGET_DIR: /var/lib/ci-jobs/cache/target/mekhan
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/ci-jobs/cache:/var/lib/ci-jobs/cache
    commands:
      - FORGEJO_REGISTRY_USER=$(vault kv get -field=username secret/docker/registry)
      - FORGEJO_REGISTRY_PASSWORD=$(vault kv get -field=token   secret/docker/registry)
      - echo "$FORGEJO_REGISTRY_PASSWORD" | docker login forge.aithericon.eu -u "$FORGEJO_REGISTRY_USER" --password-stdin
      - just ci::publish-backend-service "$REGISTRY" "$CI_COMMIT_SHA" "$CI_COMMIT_BRANCH"
    depends_on: [build-backend-service, build-frontend]

  # Builds the aithericon-executor OCI image. The executor's Dockerfile is
  # multi-stage (Rust compile happens INSIDE Docker via BuildKit cache
  # mounts), so this step doesn't technically need build-backend-service /
  # build-frontend outputs — but `depends_on: [build-backend-service]` is
  # set deliberately to enforce a strict service-first pipeline order.
  # Slower (~5-8 min) because kreuzberg + tesseract drag in heavy native deps.
  - name: publish-backend-executor
    image: forge.aithericon.eu/milanender/mekhan-ci-builder:latest
    pull: true
    environment:
      REGISTRY: forge.aithericon.eu/milanender
      VAULT_ADDR: "http://10.20.0.20:8200"
      VAULT_TOKEN:
        from_secret: vault_token
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    commands:
      - FORGEJO_REGISTRY_USER=$(vault kv get -field=username secret/docker/registry)
      - FORGEJO_REGISTRY_PASSWORD=$(vault kv get -field=token   secret/docker/registry)
      - echo "$FORGEJO_REGISTRY_PASSWORD" | docker login forge.aithericon.eu -u "$FORGEJO_REGISTRY_USER" --password-stdin
      - just ci::publish-backend-executor "$REGISTRY" "$CI_COMMIT_SHA" "$CI_COMMIT_BRANCH"

    depends_on: [publish-backend-service]

  # Builds the aithericon-engine OCI image. Same shape as the executor step
  # (in-Docker Rust compile, monorepo as context for ../executor/../shared
  # path deps), but faster (~3-5 min) because engine has no native FFI deps.
  # Like executor, gated on build-backend-service for strict pipeline order
  # even though no artifact is consumed.
  - name: publish-backend-engine
    image: forge.aithericon.eu/milanender/mekhan-ci-builder:latest
    pull: true
    environment:
      REGISTRY: forge.aithericon.eu/milanender
      VAULT_ADDR: "http://10.20.0.20:8200"
      VAULT_TOKEN:
        from_secret: vault_token
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    commands:
      - FORGEJO_REGISTRY_USER=$(vault kv get -field=username secret/docker/registry)
      - FORGEJO_REGISTRY_PASSWORD=$(vault kv get -field=token   secret/docker/registry)
      - echo "$FORGEJO_REGISTRY_PASSWORD" | docker login forge.aithericon.eu -u "$FORGEJO_REGISTRY_USER" --password-stdin
      - just ci::publish-backend-engine "$REGISTRY" "$CI_COMMIT_SHA" "$CI_COMMIT_BRANCH"
    depends_on: [publish-backend-executor]
