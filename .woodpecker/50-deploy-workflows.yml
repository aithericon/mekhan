# =============================================================================
# GitOps workflow deploy — `mekhan apply` git-authored templates
# =============================================================================
# Gated: manual dispatch on main, or a version tag. NOT run on push/PR — this
# mutates a live mekhan server. Builds the mekhan CLI and applies every
# template directory under `workflows/`, atomically versioning + publishing
# each chain from the committed git artifact with commit provenance recorded
# in `workflow_templates.source_ref`.
#
# Distinct from 40-deploy.yml (which rolls out the mekhan-service container).
# This one only touches workflow_templates rows on an already-running server.
#
# Target server: the `server_url` baked into each `.mekhan.json`.
# Auth: the `mekhan_cli_token` Woodpecker secret (a Zitadel service-user
# Personal Access Token) is exported as MEKHAN_CLI_TOKEN; the server
# validates it via Zitadel RFC 7662 token introspection.
# =============================================================================

when:
  - branch: main
    event: manual
  - event: tag

labels:
  role: build
  host: worker-hetzner

steps:
  - name: apply-workflows
    image: forge.aithericon.eu/milanender/mekhan-ci-builder:latest
    environment:
      CARGO_HOME: /var/lib/ci-jobs/cache/cargo
      MEKHAN_CLI_TOKEN:
        from_secret: mekhan_cli_token
    commands:
      - just ci::apply-workflows
    depends_on: []
