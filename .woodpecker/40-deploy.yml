# =============================================================================
# Deploy pool — Terraform/Nomad rollout of mekhan-service
# =============================================================================
# Trigger: push to `dev` branch → auto deploy. Manual on `dev` for replays.
#
# Single-cluster setup: mekhan-side "dev" deploys to the prod HetznerCluster
# (10.20.x). When a separate cluster eventually exists for mekhan-prod, add
# a sibling 41-deploy-prod.yml — don't re-add the path inline here.
#
# Image source: 30-build.yml produces `forge.aithericon.eu/milanender/
# mekhan-service:$CI_COMMIT_SHA`. Workflow-level `depends_on: [30-build]`
# enforces the ordering so deploy never races a half-finished image push.
#
# SECRETS MODEL (mirrors web-platform):
#   - Single Woodpecker secret: `vault_token`.
#   - VAULT_ADDR is non-secret, hardcoded.
#   - Everything else: `export X=$(vault kv get -field=X path)` inline.
#
# Vault paths read below:
#   secret/nomad/bootstrap           — Nomad mgmt token (cluster-managed)
#   secret/postgres/patroni          — Patroni superuser password
#   secret/docker/registry           — Forgejo image pull creds
#   secret/services/mekhan/dev       — Hetzner S3 keys + state passphrase
#                                      (seed once with `vault kv put`, see
#                                      deploy/README.md § B)
#
# NETWORK NOTE: 10.20.0.* is reachable only over NetBird. The Woodpecker
# runner picking up `role: deploy` MUST be on the mesh. YAML can't enforce.
# =============================================================================

# TEMP: 30-build.yml is disabled (renamed to .disabled) while we test the
# deploy pipeline in isolation. Re-add `depends_on: [30-build]` here when
# 30-build.yml is re-enabled. CAUTION: with this gone, deploy reuses the
# image tag already in the registry under $CI_COMMIT_SHA — make sure
# 30-build has produced one for this commit before triggering a deploy.
when:
  # Auto on main — chained off 30-build via the workflow-level depends_on
  # above. Push to main triggers build → deploy → verify automatically.
  - branch: main
    event: push
  # Manual run from any branch — for end-to-end testing of the deploy
  # path on a feature branch (e.g. `ci-pipeline`). Deploys whatever
  # image 30-build just produced on that same branch (depends_on
  # ensures build finishes first).
  - event: manual

labels:
  role: deploy
  host: worker-hetzner

steps:
  - name: deploy-dev
    image: forge.aithericon.eu/milanender/mekhan-ci-builder:latest
    pull: true
    environment:
      VAULT_ADDR: "http://10.20.0.20:8200"
      VAULT_TOKEN:
        from_secret: vault_token
      NOMAD_SKIP_VERIFY: "true"
    commands:
      # dev.auto.tfvars is gitignored — CI uses the committed .example.
      - cp deploy/dev/dev.auto.tfvars.example deploy/dev/dev.auto.tfvars

      # ── Fetch secrets from Vault ──
      # Vault is the canonical CI source. Everything below comes from there
      # via the single VAULT_TOKEN above. To rotate any of these you only
      # touch Vault; CI re-reads on the next run.
      - export NOMAD_TOKEN=$(vault kv get -field=token secret/nomad/bootstrap)
      - export TF_VAR_nomad_token=$NOMAD_TOKEN
      - export TF_VAR_postgres_admin_password=$(vault kv get -field=superuser_password secret/postgres/patroni)
      - export TF_VAR_registry_user=$(vault kv get -field=username secret/docker/registry)
      - export TF_VAR_registry_password=$(vault kv get -field=token secret/docker/registry)
      # Mekhan-specific path holds the Hetzner S3 keypair + state encryption
      # passphrase (everything else is shared cluster infra).
      - export AWS_ACCESS_KEY_ID=$(vault kv get -field=hetzner_s3_access_key secret/services/mekhan/dev)
      - export AWS_SECRET_ACCESS_KEY=$(vault kv get -field=hetzner_s3_secret_key secret/services/mekhan/dev)
      - export TF_VAR_s3_access_key=$AWS_ACCESS_KEY_ID
      - export TF_VAR_s3_secret_key=$AWS_SECRET_ACCESS_KEY
      - export TF_VAR_state_encryption_passphrase=$(vault kv get -field=state_encryption_passphrase secret/services/mekhan/dev)
      # Zitadel JWT machine key — written to /tmp because the zitadel TF
      # provider's `jwt_profile_file` argument is a FILE PATH, not the key
      # contents. Same trick HetznerCluster's root.hcl uses (write_zitadel
      # _jwt_key terragrunt before_hook). The CI container is per-job and
      # ephemeral so /tmp evaporates between runs.
      - vault kv get -field=key secret/zitadel/iac-jwt > /tmp/zitadel-iac-jwt.json
      - export TF_VAR_zitadel_jwt_file=/tmp/zitadel-iac-jwt.json

      # ── Override Patroni hostname to plain .service.consul ──
      # variables.tf defaults to the operator alt-domain
      # (postgres-primary.service.consul.aithericon) which only resolves on
      # operator workstations with NetBird DNS rules installed. The plain
      # `postgres-primary.service.consul` form works inside the cax21
      # container if the host's resolver forwards .consul queries to its
      # local Consul agent — typical for HashiStack clusters. If this fails
      # with NXDOMAIN, revert to the Consul HTTP API lookup commit.
      - export TF_VAR_postgres_admin_host=postgres-primary.service.consul
      - 'echo "  ✓ Secrets loaded from Vault"'

      # TEMP: pinned to f8478a5 (last image built before 30-build was
      # disabled). Restore `"$CI_COMMIT_SHA"` once 30-build.yml is back.
      - just ci::deploy-dev "0db220076451a456b303081bdcec92ffd4339d46"
    depends_on: []

  - name: verify-dev
    image: forge.aithericon.eu/milanender/mekhan-ci-builder:latest
    pull: true
    environment:
      VAULT_ADDR: "http://10.20.0.20:8200"
      VAULT_TOKEN:
        from_secret: vault_token
      NOMAD_SKIP_VERIFY: "true"
    commands:
      - cp deploy/dev/dev.auto.tfvars.example deploy/dev/dev.auto.tfvars

      # `nomad deployment status` + `tofu output` both need their creds.
      # Smaller set than deploy-dev — no provisioning, just inspection.
      - export NOMAD_TOKEN=$(vault kv get -field=token secret/nomad/bootstrap)
      - export AWS_ACCESS_KEY_ID=$(vault kv get -field=hetzner_s3_access_key secret/services/mekhan/dev)
      - export AWS_SECRET_ACCESS_KEY=$(vault kv get -field=hetzner_s3_secret_key secret/services/mekhan/dev)
      - export TF_VAR_state_encryption_passphrase=$(vault kv get -field=state_encryption_passphrase secret/services/mekhan/dev)
      - export NOMAD_ADDR=$(grep '^nomad_address' deploy/dev/dev.auto.tfvars | cut -d'"' -f2)
      - 'echo "  ✓ Secrets loaded from Vault"'

      - just ci::verify-deploy dev
    depends_on: [deploy-dev]
